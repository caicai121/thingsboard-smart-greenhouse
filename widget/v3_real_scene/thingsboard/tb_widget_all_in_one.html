<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧农业大棚数字孪生监控 - TB Widget 本地检查</title>
    <style>
        /* [TB_WIDGET_CSS_START] */
        /* ========== ThingsBoard Custom Widget - 智慧农业大棚数字孪生监控 ========== */

        .tb-app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #020b12;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #e0f0ff;
            overflow: hidden;
        }

        /* 顶部标题栏 */
        .tb-header {
            height: 7vh;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2vw;
            background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, rgba(0,30,50,0.4) 50%, rgba(0,0,0,0.6) 100%);
            border-bottom: 1px solid rgba(0, 217, 255, 0.15);
            position: relative;
            z-index: 200;
        }

        .tb-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00d9ff, transparent);
        }

        .tb-header-left { display: flex; align-items: center; gap: 1vw; }

        .tb-live-badge {
            padding: 0.2vh 0.8vw;
            background: rgba(53, 242, 143, 0.15);
            border: 1px solid rgba(53, 242, 143, 0.4);
            color: #35f28f;
            font-size: 1.8vh;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 3px;
            animation: tb-live-pulse 2s ease-in-out infinite;
        }

        @keyframes tb-live-pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .tb-header-title {
            font-size: 2.8vh;
            font-weight: 600;
            letter-spacing: 2px;
            color: #e0f0ff;
            text-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
            margin: 0;
        }

        .tb-header-center { display: flex; gap: 2vw; }
        .tb-header-stat { display: flex; align-items: center; gap: 0.6vw; }
        .tb-stat-label { font-size: 1.4vh; color: #4a6a80; text-transform: uppercase; letter-spacing: 1px; }
        .tb-stat-value { font-size: 1.5vh; font-weight: 600; padding: 0.3vh 0.8vw; background: rgba(0,0,0,0.3); border: 1px solid rgba(0, 217, 255, 0.15); border-radius: 3px; color: #7a9ab0; }
        .tb-status-online { color: #35f28f; border-color: rgba(53, 242, 143, 0.3); background: rgba(53, 242, 143, 0.1); }
        .tb-header-right { display: flex; align-items: center; gap: 1.2vw; }
        .tb-header-time { font-family: 'Courier New', monospace; font-size: 2vh; color: #00d9ff; text-shadow: 0 0 8px rgba(0, 217, 255, 0.4); }

        /* 主场景 */
        .tb-greenhouse-stage { position: relative; flex: 1; width: 100%; overflow: hidden; background: #020b12; }
        .tb-greenhouse-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.8s ease; }
        .tb-greenhouse-bg.tb-night-bg { opacity: 0; }
        .tb-greenhouse-stage.night-mode .tb-night-bg { opacity: 1; }
        .tb-greenhouse-stage.day-mode .tb-day-bg { opacity: 1; }
        .tb-greenhouse-stage.day-mode .tb-night-bg { opacity: 0; }

        /* 特效层 */
        .tb-effects-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        .tb-lamp-glow { position: absolute; opacity: 0; transition: opacity 0.5s ease; background: linear-gradient(180deg, rgba(255,255,220,0) 0%, rgba(255,245,180,0.75) 30%, rgba(255,220,120,0.35) 70%, transparent 100%); filter: blur(8px); border-radius: 999px; box-shadow: 0 0 18px rgba(255,245,180,0.6), 0 0 42px rgba(255,220,120,0.35), 0 0 80px rgba(0,220,255,0.15); }
        .tb-lamp-glow.active { opacity: 0.75; animation: tb-lamp-breathe 2.5s ease-in-out infinite; }
        .tb-greenhouse-stage.night-mode .tb-lamp-glow.active { opacity: 1; filter: blur(10px); box-shadow: 0 0 25px rgba(255,250,210,0.9), 0 0 65px rgba(255,220,120,0.7), 0 0 110px rgba(0,220,255,0.35); }
        @keyframes tb-lamp-breathe { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        .tb-lamp-glow-left-main { left: 8%; top: 16%; width: 16%; height: 12%; transform: rotate(15deg); transform-origin: center top; }
        .tb-lamp-glow-right-main { left: 78%; top: 16%; width: 16%; height: 12%; transform: rotate(-15deg); transform-origin: center top; }
        .tb-lamp-glow-left-mid { left: 27%; top: 35%; width: 10%; height: 8%; transform: rotate(25deg); transform-origin: center top; }
        .tb-lamp-glow-right-mid { left: 64%; top: 35%; width: 10%; height: 8%; transform: rotate(-25deg); transform-origin: center top; }

        /* 风扇 */
        .tb-fan-effect { position: absolute; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .tb-fan-effect.active { opacity: 1; }
        .tb-fan-blade { width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(0, 217, 255, 0.4); position: relative; }
        .tb-fan-blade::before, .tb-fan-blade::after { content: ''; position: absolute; border-radius: 50%; }
        .tb-fan-blade::before { inset: 15%; border: 1px solid rgba(0, 217, 255, 0.3); }
        .tb-fan-blade::after { inset: 35%; background: rgba(0, 217, 255, 0.15); }
        .tb-fan-effect.active .tb-fan-blade { animation: tb-fan-spin 0.5s linear infinite; }
        .tb-fan-blade-small { width: 100%; height: 100%; border-radius: 50%; border: 1.5px solid rgba(0, 217, 255, 0.35); }
        .tb-fan-blade-small::before { content: ''; position: absolute; inset: 20%; border-radius: 50%; border: 1px solid rgba(0, 217, 255, 0.25); }
        .tb-fan-effect.active .tb-fan-blade-small { animation: tb-fan-spin 0.6s linear infinite; }
        @keyframes tb-fan-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tb-fan-effect-left { left: 16.75%; top: 31%; width: 5.5%; height: 8%; }
        .tb-fan-effect-right { left: 77.75%; top: 31%; width: 5.5%; height: 8%; }
        .tb-fan-effect-left-back { left: 33.25%; top: 36.5%; width: 3.5%; height: 5%; }
        .tb-fan-effect-right-back { left: 63.25%; top: 36.5%; width: 3.5%; height: 5%; }

        /* 喷淋 */
        .tb-spray-effect { position: absolute; width: 42%; height: 36%; opacity: 0; pointer-events: none; transform-origin: top center; transition: opacity 0.25s ease; }
        .tb-spray-effect.active { opacity: 1; }
        .tb-water-line { position: absolute; left: 50%; top: 0; width: 1.5px; height: var(--length); background: linear-gradient(to bottom, rgba(220,250,255,0.95), rgba(80,210,255,0.65), rgba(80,210,255,0)); box-shadow: 0 0 6px rgba(80,220,255,0.8); transform-origin: top center; transform: translateX(var(--x-offset)) rotate(var(--angle)); animation: tb-water-line-pulse 0.9s linear infinite; animation-delay: var(--delay); }
        .tb-water-particle { position: absolute; left: 50%; top: 0; width: var(--size); height: var(--size); border-radius: 50%; background: rgba(170,240,255,0.9); box-shadow: 0 0 8px rgba(100,220,255,0.75); animation: tb-water-particle-move 1.1s linear infinite; animation-delay: var(--delay); }
        @keyframes tb-water-line-pulse { 0% { opacity: 0; transform: translateX(var(--x-offset)) rotate(var(--angle)) scaleY(0.45); } 35% { opacity: 0.95; } 100% { opacity: 0.1; transform: translateX(var(--x-offset)) rotate(var(--angle)) scaleY(1); } }
        @keyframes tb-water-particle-move { 0% { opacity: 0; transform: rotate(var(--angle)) translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: rotate(var(--angle)) translateY(var(--distance)); } }
        .tb-spray-left-front { left: -8%; top: 48%; width: 42%; height: 36%; }
        .tb-spray-left-mid { left: 10%; top: 52%; width: 38%; height: 32%; }
        .tb-spray-right-mid { left: 52%; top: 52%; width: 38%; height: 32%; }
        .tb-spray-right-front { left: 66%; top: 48%; width: 42%; height: 36%; }

        /* 管道 */
        .tb-pipe-flow { position: absolute; opacity: 0; transition: opacity 0.5s; background: rgba(0, 217, 255, 0.15); box-shadow: 0 0 10px rgba(0, 217, 255, 0.2); }
        .tb-pipe-flow.active { opacity: 1; }
        .tb-pipe-flow-left { left: 0%; top: 40%; width: 47%; height: 0.6%; }
        .tb-pipe-flow-right { left: 53%; top: 40%; width: 47%; height: 0.6%; }

        /* 土壤告警 */
        .tb-soil-warning-area { position: absolute; left: 7%; top: 54%; width: 86%; height: 38%; background: rgba(255, 149, 0, 0.08); border: 1px solid rgba(255, 149, 0, 0.2); opacity: 0; transition: opacity 0.5s; display: flex; align-items: center; justify-content: center; border-radius: 4px; pointer-events: none; }
        .tb-soil-warning-area.active { opacity: 1; animation: tb-soil-alert 2s ease-in-out infinite; }
        @keyframes tb-soil-alert { 0%, 100% { border-color: rgba(255, 149, 0, 0.15); } 50% { border-color: rgba(255, 149, 0, 0.4); } }
        .tb-soil-warning-text { font-size: 1.8vh; color: #ff9500; font-weight: 600; text-shadow: 0 0 10px rgba(255, 149, 0, 0.4); padding: 1vh 2vw; background: rgba(0,0,0,0.5); border-radius: 4px; border: 1px solid rgba(255, 149, 0, 0.3); }

        /* 中央标签 */
        .tb-center-tag { position: absolute; left: 42%; top: 43%; width: 16%; height: 6%; display: flex; align-items: center; justify-content: center; font-size: 1.4vh; color: #00d9ff; opacity: 0; transition: opacity 0.3s; }
        .tb-center-tag.active { opacity: 1; }
        .tb-center-tag::before { content: attr(data-text); padding: 0.5vh 1vw; background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 217, 255, 0.2); border-radius: 3px; white-space: nowrap; }

        /* UI层 */
        .tb-ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
        .tb-ui-layer > * { pointer-events: auto; }

        /* 右侧仪表盘 */
        .tb-right-dashboard { position: absolute; right: 1.5%; top: 10%; width: 20%; height: 82%; display: flex; flex-direction: column; gap: 12px; pointer-events: auto; overflow: hidden; z-index: 25; }
        .tb-side-panel { position: relative; background: rgba(3, 18, 28, 0.78); border: 1px solid rgba(0, 220, 255, 0.28); border-radius: 8px; backdrop-filter: blur(10px); overflow: hidden; }
        .tb-side-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #00d9ff, transparent); }
        .tb-panel-header { display: flex; align-items: center; gap: 0.5vw; padding: 1vh 1vw; border-bottom: 1px solid rgba(0, 217, 255, 0.15); }
        .tb-panel-icon { font-size: 1.6vh; }
        .tb-panel-title { font-size: 1.4vh; font-weight: 600; color: #7a9ab0; letter-spacing: 1px; }
        .tb-panel-body { padding: 1vh 1vw; }

        /* 环境监测 */
        .tb-env-panel { flex: 1; min-height: 0; overflow-y: auto; }
        .tb-env-panel::-webkit-scrollbar { width: 6px; }
        .tb-env-panel::-webkit-scrollbar-thumb { background: rgba(0, 220, 255, 0.45); border-radius: 4px; }
        .tb-env-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(0,217,255,0.1); border-radius: 5px; padding: 1vh 0.8vw; margin-bottom: 0.8vh; position: relative; transition: all 0.3s; }
        .tb-env-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: #00d9ff; opacity: 0.5; border-radius: 5px 0 0 5px; }
        .tb-env-tag { font-size: 1vh; color: #00d9ff; opacity: 0.7; letter-spacing: 1px; }
        .tb-env-value { font-size: 2.6vh; font-weight: 700; color: #e0f0ff; line-height: 1.1; text-shadow: 0 0 8px rgba(0, 217, 255, 0.2); }
        .tb-env-unit { font-size: 1vh; color: #7a9ab0; display: inline; margin-left: 0.3vw; }
        .tb-env-name { font-size: 1.1vh; color: #7a9ab0; margin-top: 0.3vh; }
        .tb-env-card.tb-warning { border-left-color: #ff9500; }
        .tb-env-card.tb-warning .tb-env-value { color: #ff9500; }
        .tb-env-card.tb-danger { border-left-color: #ff3860; }
        .tb-env-card.tb-danger .tb-env-value { color: #ff3860; }

        /* 水位条 */
        .tb-water-level-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 0.5vh; overflow: hidden; }
        .tb-water-level-fill { height: 100%; width: 80%; background: linear-gradient(90deg, #00a8e8, #00d9ff); border-radius: 2px; transition: width 0.5s, background 0.3s; }
        .tb-water-level-fill.tb-low { background: linear-gradient(90deg, #ff3860, #ff9500); }

        /* 报警面板 */
        .tb-alarm-panel { flex: 0 0 auto; max-height: 28%; overflow-y: auto; }
        .tb-alarm-panel::-webkit-scrollbar { width: 6px; }
        .tb-alarm-panel::-webkit-scrollbar-thumb { background: rgba(0, 220, 255, 0.45); border-radius: 4px; }
        .tb-alarm-row { display: flex; align-items: center; gap: 0.6vw; padding: 0.8vh 0.6vw; border-radius: 4px; background: rgba(0,0,0,0.2); margin-bottom: 0.5vh; transition: all 0.3s; }
        .tb-alarm-row.tb-alert { background: rgba(255, 56, 96, 0.1); border: 1px solid rgba(255, 56, 96, 0.25); animation: tb-alarm-blink 2s ease-in-out infinite; }
        @keyframes tb-alarm-blink { 0%, 100% { border-color: rgba(255,56,96,0.15); } 50% { border-color: rgba(255,56,96,0.4); } }
        .tb-alarm-led { width: 6px; height: 6px; border-radius: 50%; background: #35f28f; box-shadow: 0 0 4px #35f28f; flex-shrink: 0; }
        .tb-alarm-row.tb-alert .tb-alarm-led { background: #ff3860; box-shadow: 0 0 6px #ff3860; animation: tb-led-blink 1s ease-in-out infinite; }
        @keyframes tb-led-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .tb-alarm-name { flex: 1; font-size: 1.2vh; color: #7a9ab0; }
        .tb-alarm-text { font-size: 1.1vh; color: #35f28f; font-weight: 600; }
        .tb-alarm-row.tb-alert .tb-alarm-text { color: #ff3860; }

        /* 底部状态条 */
        .tb-bottom-bar { position: absolute; left: 18%; bottom: 2%; width: 64%; height: 5.5vh; min-height: 40px; display: flex; align-items: center; justify-content: center; gap: 3vw; background: rgba(3, 18, 28, 0.78); border: 1px solid rgba(0, 220, 255, 0.28); border-radius: 8px; backdrop-filter: blur(10px); }
        .tb-bottom-bar::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px; background: linear-gradient(90deg, transparent, #00d9ff, transparent); }
        .tb-device-status { display: flex; align-items: center; gap: 0.6vw; }
        .tb-device-led { width: 8px; height: 8px; border-radius: 50%; background: #1a3a2a; box-shadow: inset 0 0 2px rgba(0,0,0,0.5); transition: all 0.3s; flex-shrink: 0; }
        .tb-device-led.tb-on { background: #35f28f; box-shadow: 0 0 8px #35f28f, inset 0 0 2px rgba(255,255,255,0.3); }
        .tb-device-led.tb-on-blue { background: #00a8e8; box-shadow: 0 0 8px #00a8e8; }
        .tb-device-led.tb-on-yellow { background: #ffe066; box-shadow: 0 0 8px #ffe066; }
        .tb-device-led.tb-on-cyan { background: #00d9ff; box-shadow: 0 0 8px #00d9ff; }
        .tb-device-led.tb-on-orange { background: #ff9500; box-shadow: 0 0 8px #ff9500; }
        .tb-device-name { font-size: 1.3vh; color: #7a9ab0; }
        .tb-device-state { font-size: 1.2vh; color: #7a9ab0; font-family: 'Courier New', monospace; }
        .tb-device-state.tb-on { color: #35f28f; }

        /* 演示场景按钮 */
        .tb-mock-buttons {
            position: absolute;
            left: 1.5%;
            bottom: 2%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 30;
            pointer-events: auto;
        }

        .tb-mock-btn {
            padding: 8px 14px;
            background: rgba(3, 18, 28, 0.5);
            border: 1px solid rgba(0, 220, 255, 0.18);
            color: #7a9ab0;
            font-size: 1.3vh;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(6px);
            white-space: nowrap;
            font-family: inherit;
        }

        .tb-mock-btn:hover {
            background: rgba(0, 220, 255, 0.1);
            border-color: rgba(0, 220, 255, 0.35);
            color: #c0e0f0;
        }

        .tb-mock-btn.active {
            background: rgba(0, 220, 255, 0.15);
            border-color: rgba(0, 220, 255, 0.5);
            color: #00d9ff;
            box-shadow: 0 0 12px rgba(0, 220, 255, 0.18);
        }

        .tb-mock-btn-restore {
            margin-top: 4px;
            border-color: rgba(53, 242, 143, 0.25);
            color: #5a8a70;
        }

        .tb-mock-btn-restore:hover {
            background: rgba(53, 242, 143, 0.08);
            border-color: rgba(53, 242, 143, 0.4);
            color: #35f28f;
        }

        /* 响应式 */
        @media (max-width: 1280px) { .tb-right-dashboard { width: 22%; } .tb-header-title { font-size: 2.2vh; } }
        @media (max-width: 768px) { .tb-header-center { display: none; } .tb-right-dashboard { width: 28%; } .tb-bottom-bar { left: 5%; width: 90%; gap: 1.5vw; } }
        /* [TB_WIDGET_CSS_END] */
    </style>
</head>
<body>
    <div class="tb-app-container">
        <header class="tb-header">
            <div class="tb-header-left">
                <div class="tb-live-badge">LIVE</div>
                <h1 class="tb-header-title">智慧农业大棚数字孪生监控</h1>
            </div>
            <div class="tb-header-center">
                <div class="tb-header-stat">
                    <span class="tb-stat-label">系统状态</span>
                    <span class="tb-stat-value tb-status-online">运行中</span>
                </div>
                <div class="tb-header-stat">
                    <span class="tb-stat-label">控制模式</span>
                    <span class="tb-stat-value tb-header-mode">手动模式</span>
                </div>
            </div>
            <div class="tb-header-right">
                <span class="tb-header-time tb-clock">--:--:--</span>
            </div>
        </header>

        <main class="tb-greenhouse-stage">
            <img class="tb-greenhouse-bg tb-day-bg active" src="../assets/greenhouse_day.png" alt="白天大棚">
            <img class="tb-greenhouse-bg tb-night-bg" src="../assets/greenhouse_night.png" alt="夜晚大棚">

            <div class="tb-effects-layer">
                <div class="tb-lamp-glow tb-lamp-glow-left-main"></div>
                <div class="tb-lamp-glow tb-lamp-glow-right-main"></div>
                <div class="tb-lamp-glow tb-lamp-glow-left-mid"></div>
                <div class="tb-lamp-glow tb-lamp-glow-right-mid"></div>

                <div class="tb-fan-effect tb-fan-effect-left"><div class="tb-fan-blade"></div></div>
                <div class="tb-fan-effect tb-fan-effect-right"><div class="tb-fan-blade"></div></div>
                <div class="tb-fan-effect tb-fan-effect-left-back"><div class="tb-fan-blade-small"></div></div>
                <div class="tb-fan-effect tb-fan-effect-right-back"><div class="tb-fan-blade-small"></div></div>

                <div class="tb-spray-effect tb-spray-left-front"></div>
                <div class="tb-spray-effect tb-spray-left-mid"></div>
                <div class="tb-spray-effect tb-spray-right-mid"></div>
                <div class="tb-spray-effect tb-spray-right-front"></div>

                <div class="tb-pipe-flow tb-pipe-flow-left"></div>
                <div class="tb-pipe-flow tb-pipe-flow-right"></div>

                <div class="tb-soil-warning-area">
                    <div class="tb-soil-warning-text">⚠ 土壤湿度低，建议灌溉</div>
                </div>
                <div class="tb-center-tag"></div>
            </div>

            <div class="tb-ui-layer">
                <div class="tb-right-dashboard">
                    <aside class="tb-side-panel tb-env-panel">
                        <div class="tb-panel-header">
                            <span class="tb-panel-icon">📊</span>
                            <span class="tb-panel-title">环境监测</span>
                        </div>
                        <div class="tb-panel-body">
                            <div class="tb-env-card tb-card-temp">
                                <div class="tb-env-tag">TEMP</div>
                                <div class="tb-env-value tb-val-temp">--</div>
                                <div class="tb-env-unit">°C</div>
                                <div class="tb-env-name">空气温度</div>
                            </div>
                            <div class="tb-env-card tb-card-hum">
                                <div class="tb-env-tag">HUM</div>
                                <div class="tb-env-value tb-val-hum">--</div>
                                <div class="tb-env-unit">%</div>
                                <div class="tb-env-name">空气湿度</div>
                            </div>
                            <div class="tb-env-card tb-card-soil">
                                <div class="tb-env-tag">SOIL</div>
                                <div class="tb-env-value tb-val-soil">--</div>
                                <div class="tb-env-unit">%</div>
                                <div class="tb-env-name">土壤湿度</div>
                            </div>
                            <div class="tb-env-card tb-card-light">
                                <div class="tb-env-tag">LUX</div>
                                <div class="tb-env-value tb-val-light">--</div>
                                <div class="tb-env-unit">lux</div>
                                <div class="tb-env-name">光照强度</div>
                            </div>
                            <div class="tb-env-card tb-card-co2">
                                <div class="tb-env-tag">CO₂</div>
                                <div class="tb-env-value tb-val-co2">--</div>
                                <div class="tb-env-unit">ppm</div>
                                <div class="tb-env-name">CO₂ 浓度</div>
                            </div>
                            <div class="tb-env-card tb-card-water">
                                <div class="tb-env-tag">H₂O</div>
                                <div class="tb-env-value tb-val-water">--</div>
                                <div class="tb-env-unit">%</div>
                                <div class="tb-env-name">水箱液位</div>
                                <div class="tb-water-level-bar">
                                    <div class="tb-water-level-fill"></div>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <aside class="tb-side-panel tb-alarm-panel">
                        <div class="tb-panel-header">
                            <span class="tb-panel-icon">🚨</span>
                            <span class="tb-panel-title">报警状态</span>
                        </div>
                        <div class="tb-panel-body">
                            <div class="tb-alarm-row tb-alarm-soil">
                                <span class="tb-alarm-led"></span>
                                <span class="tb-alarm-name">土壤湿度</span>
                                <span class="tb-alarm-text tb-text-alarm-soil">正常</span>
                            </div>
                            <div class="tb-alarm-row tb-alarm-temp">
                                <span class="tb-alarm-led"></span>
                                <span class="tb-alarm-name">温度</span>
                                <span class="tb-alarm-text tb-text-alarm-temp">正常</span>
                            </div>
                            <div class="tb-alarm-row tb-alarm-water">
                                <span class="tb-alarm-led"></span>
                                <span class="tb-alarm-name">水位</span>
                                <span class="tb-alarm-text tb-text-alarm-water">正常</span>
                            </div>
                            <div class="tb-alarm-row tb-alarm-co2">
                                <span class="tb-alarm-led"></span>
                                <span class="tb-alarm-name">CO₂</span>
                                <span class="tb-alarm-text tb-text-alarm-co2">正常</span>
                            </div>
                        </div>
                    </aside>
                </div>

                <div class="tb-bottom-bar">
                    <div class="tb-device-status">
                        <span class="tb-device-led tb-led-fan"></span>
                        <span class="tb-device-name">风扇</span>
                        <span class="tb-device-state tb-state-fan">停止</span>
                    </div>
                    <div class="tb-device-status">
                        <span class="tb-device-led tb-led-pump"></span>
                        <span class="tb-device-name">水泵</span>
                        <span class="tb-device-state tb-state-pump">停止</span>
                    </div>
                    <div class="tb-device-status">
                        <span class="tb-device-led tb-led-lamp"></span>
                        <span class="tb-device-name">补光灯</span>
                        <span class="tb-device-state tb-state-lamp">关闭</span>
                    </div>
                    <div class="tb-device-status">
                        <span class="tb-device-led tb-led-spray"></span>
                        <span class="tb-device-name">喷淋</span>
                        <span class="tb-device-state tb-state-spray">停止</span>
                    </div>
                    <div class="tb-device-status">
                        <span class="tb-device-led tb-led-auto"></span>
                        <span class="tb-device-name">自动模式</span>
                        <span class="tb-device-state tb-state-auto">关闭</span>
                    </div>
                </div>

                <div class="tb-mock-buttons">
                    <button class="tb-mock-btn active" data-scene="normalDay">☀️ 正常白天</button>
                    <button class="tb-mock-btn" data-scene="nightLamp">🌙 夜间补光</button>
                    <button class="tb-mock-btn" data-scene="irrigation">💧 自动灌溉</button>
                    <button class="tb-mock-btn" data-scene="lowWater">⚠️ 低水位报警</button>
                    <button class="tb-mock-btn tb-mock-btn-restore" data-scene="restore">🔄 恢复实时数据</button>
                </div>
            </div>
        </main>
    </div>

    <script>
    // [TB_WIDGET_JS_START]
    // 简化版本地检查脚本（无 ThingsBoard 依赖）
    const CONFIG = {
        demoMode: true
    };

    const mockScenarios = {
        normalDay: { temperature: 24.8, airHumidity: 49.3, soilHumidity: 43.0, lightIntensity: 600, co2: 641, waterLevel: 80, fanStatus: false, pumpStatus: false, lampStatus: false, sprayStatus: false, autoMode: false, soilAlarm: false, tempAlarm: false, waterAlarm: false, co2Alarm: false },
        nightLamp: { temperature: 22.5, airHumidity: 58.0, soilHumidity: 45.0, lightIntensity: 100, co2: 620, waterLevel: 78, fanStatus: false, pumpStatus: false, lampStatus: true, sprayStatus: false, autoMode: true, soilAlarm: false, tempAlarm: false, waterAlarm: false, co2Alarm: false },
        irrigation: { temperature: 27.5, airHumidity: 52.0, soilHumidity: 22.0, lightIntensity: 500, co2: 700, waterLevel: 75, fanStatus: false, pumpStatus: true, lampStatus: false, sprayStatus: true, autoMode: true, soilAlarm: true, tempAlarm: false, waterAlarm: false, co2Alarm: false },
        lowWater: { temperature: 28.0, airHumidity: 50.0, soilHumidity: 20.0, lightIntensity: 500, co2: 690, waterLevel: 10, fanStatus: false, pumpStatus: false, lampStatus: false, sprayStatus: false, autoMode: true, soilAlarm: true, tempAlarm: false, waterAlarm: true, co2Alarm: false }
    };

    let sceneMode = 'day';
    let currentScenario = 'normalDay';
    let currentData = {};
    let els = {};

    function createSprayParticles(container, lineCount, particleCount) {
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < lineCount; i++) {
            const line = document.createElement('span');
            line.className = 'tb-water-line';
            line.style.setProperty('--angle', `${-65 + Math.random() * 130}deg`);
            line.style.setProperty('--length', `${28 + Math.random() * 22}%`);
            line.style.setProperty('--delay', `${Math.random() * 0.8}s`);
            line.style.setProperty('--x-offset', `${-6 + Math.random() * 12}px`);
            container.appendChild(line);
        }
        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('span');
            p.className = 'tb-water-particle';
            p.style.setProperty('--angle', `${-70 + Math.random() * 140}deg`);
            p.style.setProperty('--distance', `${90 + Math.random() * 180}px`);
            p.style.setProperty('--delay', `${Math.random() * 1.2}s`);
            p.style.setProperty('--size', `${1 + Math.random() * 2.5}px`);
            container.appendChild(p);
        }
    }

    function cacheElements() {
        const q = s => document.querySelector(s);
        els = {
            bgDay: q('.tb-day-bg'), bgNight: q('.tb-night-bg'), stage: q('.tb-greenhouse-stage'),
            lampGlowLeftMain: q('.tb-lamp-glow-left-main'), lampGlowRightMain: q('.tb-lamp-glow-right-main'),
            lampGlowLeftMid: q('.tb-lamp-glow-left-mid'), lampGlowRightMid: q('.tb-lamp-glow-right-mid'),
            fanEffectLeft: q('.tb-fan-effect-left'), fanEffectRight: q('.tb-fan-effect-right'),
            fanEffectLeftBack: q('.tb-fan-effect-left-back'), fanEffectRightBack: q('.tb-fan-effect-right-back'),
            sprayLeftFront: q('.tb-spray-left-front'), sprayLeftMid: q('.tb-spray-left-mid'),
            sprayRightMid: q('.tb-spray-right-mid'), sprayRightFront: q('.tb-spray-right-front'),
            pipeFlowLeft: q('.tb-pipe-flow-left'), pipeFlowRight: q('.tb-pipe-flow-right'),
            soilWarningArea: q('.tb-soil-warning-area'), centerTag: q('.tb-center-tag'),
            valTemp: q('.tb-val-temp'), valHum: q('.tb-val-hum'), valSoil: q('.tb-val-soil'),
            valLight: q('.tb-val-light'), valCO2: q('.tb-val-co2'), valWater: q('.tb-val-water'),
            waterLevelFill: q('.tb-water-level-fill'),
            cardTemp: q('.tb-card-temp'), cardHum: q('.tb-card-hum'), cardSoil: q('.tb-card-soil'),
            cardLight: q('.tb-card-light'), cardCO2: q('.tb-card-co2'), cardWater: q('.tb-card-water'),
            alarmSoil: q('.tb-alarm-soil'), textAlarmSoil: q('.tb-text-alarm-soil'),
            alarmTemp: q('.tb-alarm-temp'), textAlarmTemp: q('.tb-text-alarm-temp'),
            alarmWater: q('.tb-alarm-water'), textAlarmWater: q('.tb-text-alarm-water'),
            alarmCO2: q('.tb-alarm-co2'), textAlarmCO2: q('.tb-text-alarm-co2'),
            ledFan: q('.tb-led-fan'), stateFan: q('.tb-state-fan'),
            ledPump: q('.tb-led-pump'), statePump: q('.tb-state-pump'),
            ledLamp: q('.tb-led-lamp'), stateLamp: q('.tb-state-lamp'),
            ledSpray: q('.tb-led-spray'), stateSpray: q('.tb-state-spray'),
            ledAuto: q('.tb-led-auto'), stateAuto: q('.tb-state-auto'),
            headerMode: q('.tb-header-mode'), clock: q('.tb-clock')
        };
        document.querySelectorAll('.tb-spray-effect').forEach(el => createSprayParticles(el, 45, 70));
    }

    function applySceneMode(mode) {
        sceneMode = mode;
        if (!els.stage) return;
        if (mode === 'day') {
            els.bgDay.classList.add('active'); els.bgNight.classList.remove('active');
            els.stage.classList.add('day-mode'); els.stage.classList.remove('night-mode');
        } else {
            els.bgDay.classList.remove('active'); els.bgNight.classList.add('active');
            els.stage.classList.add('night-mode'); els.stage.classList.remove('day-mode');
        }
    }

    function updateCardStatus(card, value, warnThreshold, dangerThreshold) {
        if (!card) return;
        card.classList.remove('tb-warning', 'tb-danger');
        if (dangerThreshold !== null && value < dangerThreshold) card.classList.add('tb-danger');
        else if (warnThreshold !== null && value > warnThreshold) card.classList.add('tb-warning');
    }

    function updateAlarmRow(row, textEl, isAlert, alertText) {
        if (!row) return;
        row.classList.toggle('tb-alert', isAlert);
        if (textEl) textEl.textContent = isAlert ? alertText : '正常';
    }

    function updateDeviceStatus(led, state, isOn, onText, offText, onClass) {
        if (!led) return;
        led.className = 'tb-device-led';
        if (isOn) { led.classList.add(onClass); if (state) { state.textContent = onText; state.classList.add('tb-on'); } }
        else { if (state) { state.textContent = offText; state.classList.remove('tb-on'); } }
    }

    function updateDashboard(data) {
        currentData = data;

        const isNight = sceneMode === 'night';
        [els.lampGlowLeftMain, els.lampGlowRightMain, els.lampGlowLeftMid, els.lampGlowRightMid].forEach(el => {
            if (!el) return;
            el.classList.toggle('active', data.lampStatus);
            el.style.opacity = data.lampStatus ? (isNight ? '0.9' : '0.6') : '0';
        });

        if (els.fanEffectLeft) els.fanEffectLeft.classList.toggle('active', data.fanStatus);
        if (els.fanEffectRight) els.fanEffectRight.classList.toggle('active', data.fanStatus);
        if (els.fanEffectLeftBack) els.fanEffectLeftBack.classList.toggle('active', data.fanStatus);
        if (els.fanEffectRightBack) els.fanEffectRightBack.classList.toggle('active', data.fanStatus);

        if (els.sprayLeftFront) els.sprayLeftFront.classList.toggle('active', data.sprayStatus);
        if (els.sprayLeftMid) els.sprayLeftMid.classList.toggle('active', data.sprayStatus);
        if (els.sprayRightMid) els.sprayRightMid.classList.toggle('active', data.sprayStatus);
        if (els.sprayRightFront) els.sprayRightFront.classList.toggle('active', data.sprayStatus);

        if (els.pipeFlowLeft) els.pipeFlowLeft.classList.toggle('active', data.pumpStatus);
        if (els.pipeFlowRight) els.pipeFlowRight.classList.toggle('active', data.pumpStatus);

        const soilAlert = data.soilAlarm || data.soilHumidity < 30;
        if (els.soilWarningArea) els.soilWarningArea.classList.toggle('active', soilAlert);

        const texts = [];
        if (data.autoMode) texts.push('自动模式运行中');
        if (data.sprayStatus) texts.push('灌溉系统运行中');
        if (data.pumpStatus) texts.push('水泵运行中');
        if (els.centerTag) {
            if (texts.length > 0) { els.centerTag.setAttribute('data-text', texts[0]); els.centerTag.classList.add('active'); }
            else { els.centerTag.classList.remove('active'); }
        }

        if (els.valTemp) els.valTemp.textContent = data.temperature.toFixed(1);
        if (els.valHum) els.valHum.textContent = data.airHumidity.toFixed(1);
        if (els.valSoil) els.valSoil.textContent = data.soilHumidity.toFixed(1);
        if (els.valLight) els.valLight.textContent = Math.round(data.lightIntensity);
        if (els.valCO2) els.valCO2.textContent = Math.round(data.co2);
        if (els.valWater) els.valWater.textContent = data.waterLevel.toFixed(1);

        if (els.waterLevelFill) {
            els.waterLevelFill.style.width = data.waterLevel + '%';
            els.waterLevelFill.classList.toggle('tb-low', data.waterLevel < 20);
        }

        updateCardStatus(els.cardTemp, data.temperature, 32, 38);
        updateCardStatus(els.cardHum, data.airHumidity, null, null);
        updateCardStatus(els.cardSoil, data.soilHumidity, null, 30);
        updateCardStatus(els.cardLight, data.lightIntensity, null, null);
        updateCardStatus(els.cardCO2, data.co2, 1000, 1500);
        updateCardStatus(els.cardWater, data.waterLevel, null, 20);

        updateAlarmRow(els.alarmSoil, els.textAlarmSoil, data.soilAlarm, '土壤干旱');
        updateAlarmRow(els.alarmTemp, els.textAlarmTemp, data.tempAlarm, '温度过高');
        updateAlarmRow(els.alarmWater, els.textAlarmWater, data.waterAlarm, '水位过低');
        updateAlarmRow(els.alarmCO2, els.textAlarmCO2, data.co2Alarm, 'CO₂过高');

        updateDeviceStatus(els.ledFan, els.stateFan, data.fanStatus, '运行', '停止', 'tb-on');
        updateDeviceStatus(els.ledPump, els.statePump, data.pumpStatus, '运行', '停止', 'tb-on-blue');
        updateDeviceStatus(els.ledLamp, els.stateLamp, data.lampStatus, '开启', '关闭', 'tb-on-yellow');
        updateDeviceStatus(els.ledSpray, els.stateSpray, data.sprayStatus, '运行', '停止', 'tb-on-cyan');
        updateDeviceStatus(els.ledAuto, els.stateAuto, data.autoMode, '自动', '手动', 'tb-on-orange');

        if (els.headerMode) {
            els.headerMode.textContent = data.autoMode ? '自动模式' : '手动模式';
            els.headerMode.className = 'tb-stat-value' + (data.autoMode ? ' tb-status-online' : '');
        }
    }

    function loadScene(sceneName) {
        // "恢复实时数据" — 在 TB 中会恢复真实遥测，本地预览回到正常场景
        if (sceneName === 'restore') {
            currentScenario = 'normalDay';
            document.querySelectorAll('.tb-mock-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            loadScene('normalDay');
            return;
        }

        const scenarioData = mockScenarios[sceneName];
        if (!scenarioData) return;
        currentScenario = sceneName;

        // Only normalDay and nightLamp explicitly change background
        // irrigation and lowWater preserve current day/night state
        if (sceneName === 'normalDay') {
            applySceneMode('day');
        } else if (sceneName === 'nightLamp') {
            applySceneMode('night');
        }

        const data = {};
        for (var key in scenarioData) {
            if (scenarioData.hasOwnProperty(key)) data[key] = scenarioData[key];
        }
        data.lightIntensity = sceneMode === 'night' ? 100 : 600;
        updateDashboard(data);

        // Highlight active button
        document.querySelectorAll('.tb-mock-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.scene === sceneName);
        });
    }

    function init() {
        cacheElements();

        // Bind demo scene buttons
        document.querySelectorAll('.tb-mock-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                loadScene(btn.dataset.scene);
            });
        });

        setInterval(() => {
            if (els.clock) els.clock.textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        }, 1000);

        // Start with normal day scene
        loadScene('normalDay');
        console.log('[Local Check] TB Widget all-in-one loaded. 4 demo buttons ready.');
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
    // [TB_WIDGET_JS_END]
    </script>
</body>
</html>
