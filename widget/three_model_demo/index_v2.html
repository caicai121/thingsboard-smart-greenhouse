<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧农业大棚 - 3D 数字孪生模型 V2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020b12; overflow: hidden; font-family: 'Segoe UI','Microsoft YaHei',sans-serif; }
  #canvas-container { width: 100vw; height: 100vh; }
  #status-panel {
    position: absolute; top: 16px; right: 16px;
    background: rgba(3,18,28,0.9); border: 1px solid rgba(0,217,255,0.25);
    border-radius: 10px; padding: 16px 18px; color: #c0d8e8;
    backdrop-filter: blur(8px); min-width: 200px; z-index: 10;
  }
  #status-panel h3 { font-size: 14px; margin-bottom: 12px; color: #00d9ff; border-bottom: 1px solid rgba(0,217,255,0.15); padding-bottom: 8px; }
  .status-row { display: flex; align-items: center; justify-content: space-between; margin: 6px 0; font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-dot.on { background: #35f28f; box-shadow: 0 0 6px #35f28f; }
  .status-dot.off { background: #3a5060; }
  .toggle-btn {
    display: block; width: 100%; margin: 4px 0; padding: 6px 10px;
    background: rgba(0,220,255,0.06); border: 1px solid rgba(0,220,255,0.2);
    color: #7a9ab0; border-radius: 4px; cursor: pointer; font-size: 11px;
    transition: all 0.2s; font-family: inherit;
  }
  .toggle-btn:hover { background: rgba(0,220,255,0.15); color: #00d9ff; }
  .toggle-btn.active { border-color: #35f28f; color: #35f28f; background: rgba(53,242,143,0.1); }
  #btn-reset {
    display: block; width: 100%; margin-top: 10px; padding: 6px 10px;
    background: rgba(0,217,255,0.1); border: 1px solid rgba(0,217,255,0.3);
    color: #00d9ff; border-radius: 4px; cursor: pointer; font-size: 11px;
    transition: all 0.2s; font-family: inherit;
  }
  #btn-reset:hover { background: rgba(0,217,255,0.2); }
  #info-tip {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #4a6a80; font-size: 11px;
  }
  #alarm-overlay {
    position: absolute; top: 16px; left: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 10;
  }
  .alarm-tag {
    padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold;
    background: rgba(20,0,0,0.85); border: 1px solid #ff3860; color: #ff3860;
    display: none;
  }
  .alarm-tag.active { display: block; animation: alarmBlink 1s infinite; }
  @keyframes alarmBlink {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="alarm-overlay">
  <div class="alarm-tag" id="alarm-soil">土壤干旱告警</div>
  <div class="alarm-tag" id="alarm-temp">高温告警</div>
  <div class="alarm-tag" id="alarm-water">低水位告警</div>
</div>

<div id="status-panel">
  <h3>3D 数字孪生状态</h3>
  <div class="status-row"><span><span class="status-dot" id="dot-fan"></span>风扇</span><span id="txt-fan">停止</span></div>
  <button class="toggle-btn" id="btn-fan">切换风扇</button>
  <div class="status-row" style="margin-top:8px"><span><span class="status-dot" id="dot-lamp"></span>补光灯</span><span id="txt-lamp">关闭</span></div>
  <button class="toggle-btn" id="btn-lamp">切换补光灯</button>
  <div class="status-row" style="margin-top:8px"><span><span class="status-dot" id="dot-spray"></span>喷淋</span><span id="txt-spray">停止</span></div>
  <button class="toggle-btn" id="btn-spray">切换喷淋</button>
  <div class="status-row" style="margin-top:8px"><span><span class="status-dot" id="dot-pump"></span>水泵(补水)</span><span id="txt-pump">停止</span></div>
  <button class="toggle-btn" id="btn-pump">切换水泵</button>
  <button id="btn-reset">重置视角</button>
</div>

<div id="info-tip">左键旋转 | 滚轮缩放 | 右键平移 | 重置视角按钮在右上角</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');

// ========== 场景初始化 ==========
const scene = new THREE.Scene();
scene.background = new THREE.Color('#020b12');
scene.fog = new THREE.Fog('#020b12', 15, 45);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 100);
camera.position.set(6, 5.5, 10);
const defaultCamPos = camera.position.clone();
const defaultCamTarget = new THREE.Vector3(0, 1.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.copy(defaultCamTarget);
controls.minDistance = 3;
controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI * 0.55;
controls.update();

// ========== 光照 ==========
const ambientLight = new THREE.AmbientLight('#1a3050', 1.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight('#fff8e8', 2.5);
sunLight.position.set(8, 12, 5);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024, 1024);
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 50;
sunLight.shadow.camera.left = -12;
sunLight.shadow.camera.right = 12;
sunLight.shadow.camera.top = 12;
sunLight.shadow.camera.bottom = -12;
sunLight.shadow.bias = -0.0001;
sunLight.shadow.normalBias = 0.02;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight('#4466aa', 0.8);
fillLight.position.set(-3, 3, -3);
scene.add(fillLight);

// ========== 材质库 ==========
const matMetal = new THREE.MeshStandardMaterial({ color: '#889ca8', roughness: 0.35, metalness: 0.7 });
const matMetalDark = new THREE.MeshStandardMaterial({ color: '#5a6e78', roughness: 0.3, metalness: 0.8 });
const matFilm = new THREE.MeshPhysicalMaterial({
  color: '#c8e0f0', roughness: 0.15, metalness: 0.05,
  transparent: true, opacity: 0.22, side: THREE.DoubleSide,
  envMapIntensity: 0.1, clearcoat: 0.1
});
const matSoil = new THREE.MeshStandardMaterial({ color: '#4a3020', roughness: 0.9 });
const matSoilDry = new THREE.MeshStandardMaterial({ color: '#6b4530', roughness: 0.92 });
const matPlantGreen = new THREE.MeshStandardMaterial({ color: '#3d8a30', roughness: 0.65 });
const matPlantLight = new THREE.MeshStandardMaterial({ color: '#5aad40', roughness: 0.6 });
const matPlantDark = new THREE.MeshStandardMaterial({ color: '#2d6a20', roughness: 0.7 });
const matGround = new THREE.MeshStandardMaterial({ color: '#1a2a20', roughness: 0.85 });
const matTankBody = new THREE.MeshPhysicalMaterial({ color: '#4060a0', roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.6 });
const matTankFrame = new THREE.MeshStandardMaterial({ color: '#6070a0', roughness: 0.3, metalness: 0.6 });
const matWater = new THREE.MeshStandardMaterial({ color: '#4499dd', roughness: 0.1, metalness: 0.05, transparent: true, opacity: 0.7 });
const matPipe = new THREE.MeshStandardMaterial({ color: '#5070a0', roughness: 0.3, metalness: 0.5 });
const matPipeFlow = new THREE.MeshStandardMaterial({ color: '#00d9ff', roughness: 0.1, emissive: '#003050', emissiveIntensity: 0.6 });
const matFanHousing = new THREE.MeshStandardMaterial({ color: '#556670', roughness: 0.3, metalness: 0.6 });
const matBlade = new THREE.MeshStandardMaterial({ color: '#889ca8', roughness: 0.25, metalness: 0.5 });
const matLEDOff = new THREE.MeshStandardMaterial({ color: '#555555', roughness: 0.4, metalness: 0.4 });
const matLEDOn = new THREE.MeshStandardMaterial({ color: '#ffe8a0', roughness: 0.2, emissive: '#ffe8a0', emissiveIntensity: 1.5 });

// ========== 可动对象引用 ==========
const dynamicObjects = {
  fans: [], lamps: [], sprinklers: [], sprayParticles: null,
  tankWater: null, tankFrame: null, pipeFlows: [],
  soilBeds: [], plants: [], alarmMarkers: []
};

// ========== 地面和网格 ==========
function createGround() {
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(16, 12),
    matGround
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.01;
  ground.receiveShadow = true;
  scene.add(ground);

  const grid = new THREE.PolarGridHelper(8, 32, 24, 64, '#0a2a30', '#0a2a30');
  grid.position.y = 0.005;
  scene.add(grid);
}

// ========== 温室大棚结构 ==========
function createGreenhouseStructure() {
  const gh = new THREE.Group();
  const L = 5.5; // 半长 (z方向)
  const W = 3.2; // 半宽 (x方向)
  const H = 3.0; // 高度
  const archCount = 9;

  // 拱形骨架
  for (let i = 0; i < archCount; i++) {
    const z = -L + (i / (archCount - 1)) * L * 2;
    const archPath = new THREE.CatmullRomCurve3([
      new THREE.Vector3(-W, 0, 0),
      new THREE.Vector3(-W * 0.8, H * 0.7, 0),
      new THREE.Vector3(0, H, 0),
      new THREE.Vector3(W * 0.8, H * 0.7, 0),
      new THREE.Vector3(W, 0, 0)
    ], false, 'catmullrom', 0.5);
    const tubeGeo = new THREE.TubeGeometry(archPath, 32, 0.05, 8, false);
    const arch = new THREE.Mesh(tubeGeo, matMetalDark);
    arch.position.z = z;
    arch.castShadow = true;
    arch.receiveShadow = true;
    gh.add(arch);
  }

  // 顶部主梁
  const ridgeGeo = new THREE.CylinderGeometry(0.05, 0.05, L * 2, 8);
  const ridge = new THREE.Mesh(ridgeGeo, matMetal);
  ridge.rotation.x = Math.PI / 2;
  ridge.position.set(0, H, 0);
  ridge.castShadow = true;
  gh.add(ridge);

  // 两侧纵梁
  [-W, W].forEach(x => {
    const beamGeo = new THREE.CylinderGeometry(0.04, 0.04, L * 2, 8);
    const beam = new THREE.Mesh(beamGeo, matMetal);
    beam.rotation.x = Math.PI / 2;
    beam.position.set(x, H * 0.55, 0);
    beam.castShadow = true;
    gh.add(beam);
  });

  // 底部纵梁
  [-W, W].forEach(x => {
    const beamGeo = new THREE.CylinderGeometry(0.04, 0.04, L * 2, 8);
    const beam = new THREE.Mesh(beamGeo, matMetal);
    beam.rotation.x = Math.PI / 2;
    beam.position.set(x, 0.05, 0);
    gh.add(beam);
  });

  // 立柱 (四角+中间)
  [-W, 0, W].forEach(x => {
    [-L, 0, L].forEach(z => {
      if (Math.abs(x) === W || Math.abs(z) === L) {
        const poleGeo = new THREE.CylinderGeometry(0.06, 0.06, H, 8);
        const pole = new THREE.Mesh(poleGeo, matMetalDark);
        pole.position.set(x, H / 2, z);
        pole.castShadow = true;
        gh.add(pole);
      }
    });
  });

  // 半透明棚膜
  const filmGeo = new THREE.CylinderGeometry(W * 0.95, W * 1.02, L * 2, 24, 1, true, 0, Math.PI);
  const film = new THREE.Mesh(filmGeo, matFilm);
  film.rotation.set(0, 0, Math.PI / 2);
  film.position.set(0, H / 2, 0);
  film.renderOrder = 1;
  film.material.depthWrite = false;
  gh.add(film);

  scene.add(gh);
  return gh;
}

// ========== 种植垄 + 植物 ==========
function createPlantBeds() {
  const bedsGroup = new THREE.Group();
  const bedCount = 4;
  const bedLength = 4.5;
  const bedWidth = 0.5;
  const bedHeight = 0.12;
  const spacing = 1.4;

  for (let i = 0; i < bedCount; i++) {
    const z = -spacing * (bedCount - 1) / 2 + i * spacing;
    const bed = new THREE.Mesh(
      new THREE.BoxGeometry(bedLength, bedHeight, bedWidth),
      matSoil
    );
    bed.position.set(0, bedHeight / 2, z);
    bed.receiveShadow = true;
    bed.castShadow = true;
    bed.name = 'soilBed';
    bedsGroup.add(bed);
    dynamicObjects.soilBeds.push(bed);
  }
  scene.add(bedsGroup);
  return bedsGroup;
}

function createPlants() {
  const plantsGroup = new THREE.Group();
  const bedCount = 4;
  const bedLength = 4.5;
  const spacing = 1.4;
  const plantsPerBed = 10;

  for (let b = 0; b < bedCount; b++) {
    const z = -spacing * (bedCount - 1) / 2 + b * spacing;
    for (let i = 0; i < plantsPerBed; i++) {
      const x = -bedLength / 2 + (i + 0.5) * (bedLength / plantsPerBed);
      const plant = createSinglePlant(x, 0.12, z + (Math.random() - 0.5) * 0.3);
      plantsGroup.add(plant);
      dynamicObjects.plants.push(plant);
    }
  }
  scene.add(plantsGroup);
  return plantsGroup;
}

function createSinglePlant(x, y, z) {
  const group = new THREE.Group();
  group.position.set(x, y, z);
  const scale = 0.7 + Math.random() * 0.6;

  // 茎
  const stemGeo = new THREE.CylinderGeometry(0.03, 0.04, 0.25 * scale, 6);
  const stem = new THREE.Mesh(stemGeo, new THREE.MeshStandardMaterial({ color: '#5a7a40', roughness: 0.7 }));
  stem.position.y = 0.15 * scale;
  stem.castShadow = true;
  group.add(stem);

  // 叶子
  const leafColors = ['#3d8a30', '#5aad40', '#2d6a20', '#4a9a38', '#3d8030'];
  for (let j = 0; j < 5; j++) {
    const leafGeo = new THREE.SphereGeometry(0.08 * scale, 6, 3);
    leafGeo.scale(1, 0.25, 0.6);
    const leaf = new THREE.Mesh(leafGeo, new THREE.MeshStandardMaterial({
      color: leafColors[Math.floor(Math.random() * leafColors.length)],
      roughness: 0.6
    }));
    const angle = (j / 5) * Math.PI * 2 + Math.random() * 0.5;
    const radius = 0.06 * scale;
    leaf.position.set(
      Math.cos(angle) * radius,
      0.1 * scale + j * 0.05 * scale,
      Math.sin(angle) * radius
    );
    leaf.rotation.z = (Math.random() - 0.5) * 0.8;
    leaf.rotation.x = Math.PI / 3 + Math.random() * 0.3;
    leaf.castShadow = true;
    group.add(leaf);
  }

  group.userData = {
    baseY: y,
    breathSpeed: 0.5 + Math.random() * 1.5,
    breathOffset: Math.random() * Math.PI * 2,
    breathAmp: 0.005 + Math.random() * 0.01
  };
  return group;
}

// ========== 风扇 ==========
function createFans() {
  const fansGroup = new THREE.Group();
  const positions = [
    [-3.1, 1.6, -3.5], [3.1, 1.6, -3.5],
    [-3.1, 1.6, 3.5], [3.1, 1.6, 3.5]
  ];

  positions.forEach(([x, y, z]) => {
    const fan = new THREE.Group();

    // 外壳 (圆环)
    const housingGeo = new THREE.TorusGeometry(0.3, 0.06, 8, 16);
    const housing = new THREE.Mesh(housingGeo, matFanHousing);
    housing.castShadow = true;
    fan.add(housing);

    // 扇叶组
    const bladesGroup = new THREE.Group();
    for (let i = 0; i < 3; i++) {
      const bladeGeo = new THREE.BoxGeometry(0.07, 0.45, 0.04);
      const blade = new THREE.Mesh(bladeGeo, matBlade);
      blade.rotation.z = (i / 3) * Math.PI * 2;
      blade.position.y = 0.15;
      blade.castShadow = true;
      bladesGroup.add(blade);
    }
    // 中心轴
    const hubGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.08, 8);
    const hub = new THREE.Mesh(hubGeo, matMetalDark);
    hub.rotation.x = Math.PI / 2;
    bladesGroup.add(hub);

    fan.add(bladesGroup);
    fan.userData = { blades: bladesGroup };

    // 支架
    const bracketGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.4, 8);
    const bracket = new THREE.Mesh(bracketGeo, matMetalDark);
    bracket.position.y = -0.35;
    bracket.castShadow = true;
    fan.add(bracket);

    // 安装座
    const mountGeo = new THREE.CylinderGeometry(0.1, 0.12, 0.1, 8);
    const mount = new THREE.Mesh(mountGeo, matMetal);
    mount.position.y = -0.5;
    fan.add(mount);

    fan.position.set(x, y, z);
    fan.lookAt(x > 0 ? x + 1 : x - 1, y, z);
    fansGroup.add(fan);
    dynamicObjects.fans.push(fan);
  });
  scene.add(fansGroup);
  return fansGroup;
}

// ========== LED 补光灯 ==========
function createLights() {
  const lightsGroup = new THREE.Group();
  const lampLength = 2.5;

  // 左右各一条 LED 灯带
  [-1.8, 1.8].forEach(x => {
    [-1.5, 1.5].forEach(z => {
      const lamp = new THREE.Group();

      // 灯体
      const bodyGeo = new THREE.BoxGeometry(lampLength, 0.06, 0.14);
      const body = new THREE.Mesh(bodyGeo, matLEDOff);
      body.castShadow = true;
      body.name = 'lampBody';
      lamp.add(body);

      // 发光面板 (初始暗)
      const glowGeo = new THREE.PlaneGeometry(lampLength - 0.2, 0.08);
      const glow = new THREE.Mesh(glowGeo, matLEDOn.clone());
      glow.rotation.x = -Math.PI / 2;
      glow.position.y = -0.04;
      glow.name = 'glowPanel';
      glow.material.opacity = 0;
      glow.material.transparent = true;
      glow.material.emissiveIntensity = 0;
      lamp.add(glow);

      // 点光源 (初始关闭)
      const spotLight = new THREE.SpotLight('#ffe8a0', 0, 10, Math.PI / 5, 0.3, 0.5);
      spotLight.position.y = -0.5;
      spotLight.name = 'lampSpot';
      lamp.add(spotLight);

      lamp.position.set(x, 2.85, z);
      lamp.userData = { body, glow, spotLight, lampLength };
      lightsGroup.add(lamp);
      dynamicObjects.lamps.push(lamp);
    });
  });
  scene.add(lightsGroup);
  return lightsGroup;
}

// ========== 喷淋系统 ==========
function createSprinklers() {
  const sprinklersGroup = new THREE.Group();
  const positions = [
    [-1.3, 1.8, -1.2], [1.3, 1.8, -1.2],
    [-1.3, 1.8, 1.2], [1.3, 1.8, 1.2]
  ];

  positions.forEach(([x, h, z]) => {
    const head = new THREE.Group();

    // 立管
    const pipeGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.6, 8);
    const pipe = new THREE.Mesh(pipeGeo, matPipe);
    pipe.position.y = 0.3;
    pipe.castShadow = true;
    head.add(pipe);

    // 喷嘴
    const nozzleGeo = new THREE.ConeGeometry(0.08, 0.15, 8);
    const nozzle = new THREE.Mesh(nozzleGeo, matMetalDark);
    nozzle.position.y = 0.65;
    nozzle.castShadow = true;
    head.add(nozzle);

    // 小横管
    const armGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.3, 6);
    const arm = new THREE.Mesh(armGeo, matPipe);
    arm.rotation.z = Math.PI / 2;
    arm.position.set(0.15, 0.63, 0);
    head.add(arm);

    head.position.set(x, h - 0.2, z);
    sprinklersGroup.add(head);
  });

  scene.add(sprinklersGroup);

  // 喷雾粒子组
  const sprayGroup = new THREE.Group();
  sprayGroup.visible = false;
  const particleGeo = new THREE.SphereGeometry(0.025, 4, 3);
  const particleMat = new THREE.MeshBasicMaterial({ color: '#aaddff', transparent: true, opacity: 0.6 });
  for (let i = 0; i < 120; i++) {
    const p = new THREE.Mesh(particleGeo, particleMat);
    p.position.set(
      -1.5 + Math.random() * 3,
      1.2 + Math.random() * 1.5,
      -1.5 + Math.random() * 3
    );
    p.userData = {
      baseX: p.position.x,
      baseY: p.position.y,
      baseZ: p.position.z,
      speed: 0.8 + Math.random() * 2,
      offset: Math.random() * Math.PI * 2
    };
    sprayGroup.add(p);
  }
  scene.add(sprayGroup);
  dynamicObjects.sprayParticles = sprayGroup;

  return sprinklersGroup;
}

// ========== 水箱 ==========
function createWaterTank() {
  const tankGroup = new THREE.Group();

  // 水箱框架 (金属边框)
  const frameGeo = new THREE.BoxGeometry(0.9, 1.0, 0.7);
  const frameEdges = new THREE.EdgesGeometry(frameGeo);
  const frame = new THREE.LineSegments(frameEdges, new THREE.LineBasicMaterial({ color: '#6088bb', linewidth: 1 }));
  frame.position.y = 0.5;
  tankGroup.add(frame);
  dynamicObjects.tankFrame = frame;

  // 透明水箱体
  const bodyGeo = new THREE.BoxGeometry(0.85, 0.95, 0.65);
  const body = new THREE.Mesh(bodyGeo, matTankBody);
  body.position.y = 0.5;
  body.castShadow = true;
  body.receiveShadow = true;
  body.renderOrder = 1;
  body.material.depthWrite = false;
  tankGroup.add(body);

  // 水面 (高度可变)
  const waterGeo = new THREE.BoxGeometry(0.8, 0.01, 0.6);
  const water = new THREE.Mesh(waterGeo, matWater);
  water.position.y = 0.1;
  water.renderOrder = 0;
  tankGroup.add(water);
  dynamicObjects.tankWater = water;

  // 底座
  const baseGeo = new THREE.BoxGeometry(0.95, 0.05, 0.75);
  const base = new THREE.Mesh(baseGeo, matMetalDark);
  tankGroup.add(base);

  tankGroup.position.set(3.5, 0, 2.8);
  scene.add(tankGroup);
  return tankGroup;
}

// ========== 管道系统 ==========
function createPipes() {
  const pipesGroup = new THREE.Group();

  // 从水箱到喷淋区的主管道
  const mainPath = new THREE.CatmullRomCurve3([
    new THREE.Vector3(3.5, 0.35, 2.8),
    new THREE.Vector3(2.5, 0.35, 2.3),
    new THREE.Vector3(1.5, 0.35, 1.8),
    new THREE.Vector3(0, 0.35, 1.5)
  ]);
  const mainPipeGeo = new THREE.TubeGeometry(mainPath, 24, 0.05, 8, false);
  const mainPipe = new THREE.Mesh(mainPipeGeo, matPipe);
  mainPipe.castShadow = true;
  mainPipe.name = 'mainPipe';
  pipesGroup.add(mainPipe);

  // 支管到喷头
  [-1.3, 1.3].forEach(x => {
    const branchPath = new THREE.CatmullRomCurve3([
      new THREE.Vector3(0, 0.35, 1.5),
      new THREE.Vector3(x, 0.35, 1.2)
    ]);
    const branchGeo = new THREE.TubeGeometry(branchPath, 12, 0.035, 6, false);
    const branch = new THREE.Mesh(branchGeo, matPipe);
    branch.castShadow = true;
    pipesGroup.add(branch);
  });

  // 流动光点 (用于动画)
  for (let i = 0; i < 8; i++) {
    const dotGeo = new THREE.SphereGeometry(0.04, 4, 4);
    const dot = new THREE.Mesh(dotGeo, matPipeFlow.clone());
    dot.visible = false;
    dot.userData = {
      pathProgress: Math.random(),
      speed: 0.15 + Math.random() * 0.3,
      path: mainPath
    };
    pipesGroup.add(dot);
    dynamicObjects.pipeFlows.push(dot);
  }

  scene.add(pipesGroup);
  return pipesGroup;
}

// ========== 告警标签 (3D) ==========
function createAlarmMarkers() {
  const markersGroup = new THREE.Group();

  function makeMarker(text, color, pos) {
    const group = new THREE.Group();
    // 小光球
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 8, 6),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0 })
    );
    group.add(sphere);
    group.position.copy(pos);
    group.visible = false;
    group.userData = { sphere };
    markersGroup.add(group);
    return group;
  }

  dynamicObjects.alarmMarkers.push({
    soil: makeMarker('#ff9500', '#ff9500', new THREE.Vector3(0, 0.4, 0))
  });
  dynamicObjects.alarmMarkers.push({
    temp: makeMarker('#ff3860', '#ff3860', new THREE.Vector3(0, 2.5, -5))
  });
  dynamicObjects.alarmMarkers.push({
    water: makeMarker('#ff3860', '#ff3860', new THREE.Vector3(3.5, 0.8, 2.8))
  });

  scene.add(markersGroup);
}

// ========== 状态管理 ==========
const mockData = {
  fanStatus: false,
  lampStatus: false,
  sprayStatus: false,
  pumpStatus: false,
  waterLevel: 60,
  soilAlarm: false,
  tempAlarm: false,
  waterAlarm: false
};

function updateUI() {
  const setRow = (key, txtOn, txtOff) => {
    document.getElementById(`txt-${key}`).textContent = mockData[key+'Status'] !== undefined ?
      (mockData[key+'Status'] ? txtOn : txtOff) :
      (mockData[key] ? txtOn : txtOff);
    const keyName = mockData[key+'Status'] !== undefined ? key+'Status' : key;
    document.getElementById(`dot-${key}`).className = 'status-dot ' + (mockData[keyName] ? 'on' : 'off');
    document.getElementById(`btn-${key}`).classList.toggle('active', mockData[keyName]);
  };
  setRow('fan', '运行', '停止');
  setRow('lamp', '开启', '关闭');
  setRow('spray', '运行', '停止');
  setRow('pump', '运行', '停止');

  // 告警标签
  ['soil','temp','water'].forEach(a => {
    const el = document.getElementById(`alarm-${a}`);
    if (el) el.classList.toggle('active', mockData[a+'Alarm']);
  });
}

['fan','lamp','spray','pump'].forEach(key => {
  document.getElementById(`btn-${key}`).addEventListener('click', () => {
    mockData[key+'Status'] = !mockData[key+'Status'];
    updateUI();
  });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  camera.position.copy(defaultCamPos);
  controls.target.copy(defaultCamTarget);
  controls.update();
});

updateUI();

// ========== 构建场景 ==========
createGround();
createGreenhouseStructure();
createPlantBeds();
createPlants();
createFans();
createLights();
createSprinklers();
createWaterTank();
createPipes();
createAlarmMarkers();

// ========== 渲染循环 ==========
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const time = performance.now() * 0.001;
  controls.update();

  // 风扇旋转
  dynamicObjects.fans.forEach(fan => {
    const blades = fan.userData.blades;
    if (blades) {
      const targetSpeed = mockData.fanStatus ? 15 : 0.3;
      blades.userData = blades.userData || { currentSpeed: 0 };
      blades.userData.currentSpeed += (targetSpeed - blades.userData.currentSpeed) * Math.min(dt * 3, 1);
      blades.rotation.y += blades.userData.currentSpeed * dt;
    }
  });

  // LED 灯光
  dynamicObjects.lamps.forEach(lamp => {
    const { body, glow, spotLight } = lamp.userData;
    const targetIntensity = mockData.lampStatus ? 2.5 : 0;
    const targetGlow = mockData.lampStatus ? 0.9 : 0;

    if (glow) {
      glow.material.emissiveIntensity += (targetIntensity - glow.material.emissiveIntensity) * dt * 3;
      glow.material.opacity += (targetGlow - glow.material.opacity) * dt * 3;
    }
    if (spotLight) spotLight.intensity += (targetIntensity - spotLight.intensity) * dt * 3;
    if (body && mockData.lampStatus) {
      body.material.color.set('#ffe8a0');
      body.material.emissive = new THREE.Color('#ffe8a0');
      body.material.emissiveIntensity += (0.6 - body.material.emissiveIntensity) * dt * 3;
    } else if (body) {
      body.material.color.set('#555555');
      body.material.emissive = new THREE.Color('#000000');
      body.material.emissiveIntensity += (0 - body.material.emissiveIntensity) * dt * 3;
    }
  });

  // 喷淋粒子
  if (dynamicObjects.sprayParticles) {
    dynamicObjects.sprayParticles.visible = mockData.sprayStatus;
    if (mockData.sprayStatus) {
      dynamicObjects.sprayParticles.children.forEach(p => {
        p.position.y = p.userData.baseY + Math.sin(time * p.userData.speed + p.userData.offset) * 0.25;
        p.position.x = p.userData.baseX + Math.cos(time * 0.7 * p.userData.speed + p.userData.offset) * 0.15;
        p.material.opacity = 0.2 + Math.abs(Math.sin(time * p.userData.speed + p.userData.offset)) * 0.5;
      });
    }
  }

  // 水箱液位
  if (dynamicObjects.tankWater) {
    const level = mockData.waterLevel / 100;
    dynamicObjects.tankWater.position.y = 0.05 + level * 0.85;
    dynamicObjects.tankWater.scale.y = Math.max(0.01, level);
    // 低水位红色
    if (mockData.waterAlarm) {
      dynamicObjects.tankWater.material.color.set('#ff4040');
      dynamicObjects.tankWater.material.emissive = new THREE.Color('#401010');
      dynamicObjects.tankWater.material.emissiveIntensity = 0.5 + Math.sin(time * 4) * 0.3;
    } else {
      dynamicObjects.tankWater.material.color.set('#4499dd');
      dynamicObjects.tankWater.material.emissive = new THREE.Color('#000000');
      dynamicObjects.tankWater.material.emissiveIntensity = 0;
    }
  }

  // 管道流动光点
  dynamicObjects.pipeFlows.forEach(dot => {
    dot.visible = mockData.pumpStatus;
    if (mockData.pumpStatus) {
      dot.userData.pathProgress += dot.userData.speed * dt;
      if (dot.userData.pathProgress > 1) dot.userData.pathProgress -= 1;
      const pt = dot.userData.path.getPoint(dot.userData.pathProgress);
      dot.position.copy(pt);
      dot.material.opacity = 0.4 + Math.sin(dot.userData.pathProgress * Math.PI * 2) * 0.3;
    }
  });

  // 管道颜色
  scene.traverse(obj => {
    if (obj.name === 'mainPipe') {
      obj.material.color.set(mockData.pumpStatus ? '#00b8e8' : '#5070a0');
    }
  });

  // 土壤告警
  dynamicObjects.soilBeds.forEach(bed => {
    bed.material.color.set(mockData.soilAlarm ? '#8a5030' : '#4a3020');
  });

  // 植物呼吸动画
  dynamicObjects.plants.forEach(plant => {
    const ud = plant.userData;
    if (ud && ud.breathSpeed) {
      plant.position.y = ud.baseY + Math.sin(time * ud.breathSpeed + ud.breathOffset) * ud.breathAmp;
    }
  });

  // 3D 告警标记
  dynamicObjects.alarmMarkers.forEach((markers, i) => {
    Object.values(markers).forEach(m => {
      const active = (m === markers.soil && mockData.soilAlarm) ||
                     (m === markers.temp && mockData.tempAlarm) ||
                     (m === markers.water && mockData.waterAlarm);
      m.visible = active;
      if (active && m.userData.sphere) {
        m.userData.sphere.material.opacity = 0.5 + Math.sin(time * 6) * 0.5;
      }
    });
  });

  renderer.render(scene, camera);
}

animate();
console.log('[3D V2] 智慧农业数字孪生模型就绪');
