<div class="tb-3d-root">
  <div class="tb-3d-canvas"></div>
  <div class="tb-3d-alarms">
    <div class="tb-alarm-tag" data-alarm="soil">土壤干旱告警</div>
    <div class="tb-alarm-tag" data-alarm="temp">高温告警</div>
    <div class="tb-alarm-tag" data-alarm="water">低水位告警</div>
  </div>
  <div class="tb-3d-reset">重置视角</div>
  <div class="tb-3d-info">左键旋转 | 滚轮缩放 | 右键平移</div>
  <div class="tb-3d-test-panel" id="tb-3d-test-panel">
    <div class="tb-test-title">3D 状态测试</div>
    <button class="tb-test-btn" data-key="fanStatus">风扇 开/关</button>
    <button class="tb-test-btn" data-key="lampStatus">补光灯 开/关</button>
    <button class="tb-test-btn" data-key="sprayStatus">喷淋 开/关</button>
    <button class="tb-test-btn" data-key="pumpStatus">水泵 开/关</button>
    <button class="tb-test-btn" data-key="waterAlarm">低水位报警 开/关</button>
    <button class="tb-test-btn" data-key="soilAlarm">土壤干旱 开/关</button>
    <button class="tb-test-btn tb-test-reset" data-key="reset">恢复实时数据</button>
  </div>
</div>
