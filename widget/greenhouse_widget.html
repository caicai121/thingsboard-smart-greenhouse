<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧农业大棚监测大屏</title>
    <link rel="stylesheet" href="greenhouse_widget.css">
</head>
<body class="day-mode">
    <div class="app-container">
        <!-- 顶部标题栏 -->
        <header class="header">
            <h1 class="header-title">智慧农业大棚监测与联动控制系统</h1>
            <div class="header-controls">
                <span class="mode-indicator" id="modeIndicator">日间模式</span>
                <button class="mode-toggle" id="modeToggle" title="切换夜间/日间模式">
                    <span class="mode-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧/中间：SVG 大棚场景 -->
            <section class="greenhouse-scene">
                <svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" id="greenhouseSvg">
                    <defs>
                        <!-- 玻璃渐变 -->
                        <linearGradient id="glassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:0.4"/>
                            <stop offset="100%" style="stop-color:#d0e8f0;stop-opacity:0.2"/>
                        </linearGradient>
                        <!-- 玻璃渐变（夜间） -->
                        <linearGradient id="glassGradientNight" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:0.5"/>
                            <stop offset="100%" style="stop-color:#0d1a25;stop-opacity:0.3"/>
                        </linearGradient>
                        <!-- 土地渐变（正常） -->
                        <linearGradient id="soilNormal" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#8B6914"/>
                            <stop offset="100%" style="stop-color:#6B4E0A"/>
                        </linearGradient>
                        <!-- 土地渐变（干旱） -->
                        <linearGradient id="soilDry" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#C4A35A"/>
                            <stop offset="100%" style="stop-color:#A08840"/>
                        </linearGradient>
                        <!-- 光晕滤镜 -->
                        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur stdDeviation="8" result="blur"/>
                            <feMerge>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <!-- 强发光滤镜 -->
                        <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
                            <feGaussianBlur stdDeviation="15" result="blur"/>
                            <feMerge>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <!-- 阴影 -->
                        <filter id="shadow">
                            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
                        </filter>
                    </defs>

                    <!-- 背景 -->
                    <rect id="sceneBg" x="0" y="0" width="800" height="560" fill="#f0f5f0"/>

                    <!-- 地面 -->
                    <rect id="ground" x="50" y="480" width="700" height="60" fill="#7a9e7a" rx="5"/>

                    <!-- 大棚框架（后层） -->
                    <path id="greenhouseBack" d="M100 480 L100 200 Q400 80 700 200 L700 480"
                          fill="url(#glassGradient)" stroke="#5a8a9a" stroke-width="3"/>

                    <!-- 大棚框架线条 -->
                    <path id="greenhouseFrame" d="M100 480 L100 200 Q400 80 700 200 L700 480"
                          fill="none" stroke="#4a7a8a" stroke-width="4"/>
                    <line x1="250" y1="143" x2="250" y2="480" stroke="#4a7a8a" stroke-width="2" opacity="0.5"/>
                    <line x1="400" y1="110" x2="400" y2="480" stroke="#4a7a8a" stroke-width="2" opacity="0.5"/>
                    <line x1="550" y1="143" x2="550" y2="480" stroke="#4a7a8a" stroke-width="2" opacity="0.5"/>

                    <!-- 土地 -->
                    <rect id="soil" x="120" y="460" width="560" height="40" fill="url(#soilNormal)" rx="3"/>

                    <!-- 植物 - 左侧 -->
                    <g id="plantLeft" transform="translate(200, 460)">
                        <rect x="-3" y="-30" width="6" height="30" fill="#4a7c3f"/>
                        <ellipse cx="-15" cy="-25" rx="18" ry="10" fill="#5a9e4a" transform="rotate(-20)"/>
                        <ellipse cx="15" cy="-20" rx="16" ry="9" fill="#5a9e4a" transform="rotate(15)"/>
                        <ellipse cx="0" cy="-35" rx="14" ry="8" fill="#6abe5a"/>
                    </g>

                    <!-- 植物 - 右侧 -->
                    <g id="plantRight" transform="translate(600, 460)">
                        <rect x="-3" y="-35" width="6" height="35" fill="#4a7c3f"/>
                        <ellipse cx="-18" cy="-30" rx="20" ry="11" fill="#5a9e4a" transform="rotate(-25)"/>
                        <ellipse cx="18" cy="-25" rx="18" ry="10" fill="#5a9e4a" transform="rotate(20)"/>
                        <ellipse cx="0" cy="-42" rx="16" ry="9" fill="#6abe5a"/>
                    </g>

                    <!-- 水箱 -->
                    <g id="waterTank" transform="translate(720, 380)">
                        <rect x="0" y="0" width="60" height="100" fill="#e0e8f0" stroke="#7a9ab0" stroke-width="2" rx="5"/>
                        <rect id="waterFill" x="5" y="20" width="50" height="75" fill="#4a90d9" opacity="0.7" rx="3"/>
                        <text x="30" y="-10" text-anchor="middle" font-size="12" fill="#555" font-family="Arial">水箱</text>
                        <!-- 水位刻度 -->
                        <line x1="55" y1="20" x2="65" y2="20" stroke="#999" stroke-width="1"/>
                        <line x1="55" y1="55" x2="65" y2="55" stroke="#999" stroke-width="1"/>
                        <line x1="55" y1="90" x2="65" y2="90" stroke="#999" stroke-width="1"/>
                    </g>

                    <!-- 水泵 -->
                    <g id="pump" transform="translate(680, 430)">
                        <rect x="0" y="0" width="30" height="40" fill="#8899aa" stroke="#667788" stroke-width="2" rx="3"/>
                        <circle cx="15" cy="20" r="8" fill="#667788"/>
                        <text x="15" y="-5" text-anchor="middle" font-size="10" fill="#555" font-family="Arial">水泵</text>
                    </g>

                    <!-- 风扇 -->
                    <g id="fan" transform="translate(400, 150)">
                        <circle cx="0" cy="0" r="35" fill="#d0d8e0" stroke="#8899aa" stroke-width="3"/>
                        <circle cx="0" cy="0" r="8" fill="#667788"/>
                        <!-- 风扇叶片组 -->
                        <g id="fanBlade">
                            <ellipse cx="0" cy="-22" rx="6" ry="18" fill="#a0a8b0" stroke="#8899aa" stroke-width="1"/>
                            <ellipse cx="19" cy="11" rx="6" ry="18" fill="#a0a8b0" stroke="#8899aa" stroke-width="1" transform="rotate(120)"/>
                            <ellipse cx="-19" cy="11" rx="6" ry="18" fill="#a0a8b0" stroke="#8899aa" stroke-width="1" transform="rotate(240)"/>
                        </g>
                        <text x="0" y="55" text-anchor="middle" font-size="12" fill="#555" font-family="Arial">风扇</text>
                    </g>

                    <!-- 补光灯 -->
                    <g id="lamp" transform="translate(300, 180)">
                        <rect x="-20" y="-10" width="40" height="15" fill="#8899aa" rx="3"/>
                        <rect x="-15" y="5" width="30" height="10" fill="#fff" opacity="0.9" rx="2"/>
                        <!-- 光晕（默认隐藏） -->
                        <ellipse id="lampGlow" cx="0" cy="30" rx="80" ry="50" fill="#FFE66D" opacity="0" filter="url(#glowStrong)"/>
                        <text x="0" y="-20" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">补光灯</text>
                    </g>

                    <!-- 补光灯2（右侧） -->
                    <g id="lamp2" transform="translate(500, 180)">
                        <rect x="-20" y="-10" width="40" height="15" fill="#8899aa" rx="3"/>
                        <rect x="-15" y="5" width="30" height="10" fill="#fff" opacity="0.9" rx="2"/>
                        <ellipse id="lampGlow2" cx="0" cy="30" rx="80" ry="50" fill="#FFE66D" opacity="0" filter="url(#glowStrong)"/>
                        <text x="0" y="-20" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">补光灯</text>
                    </g>

                    <!-- 喷淋管道 -->
                    <g id="spraySystem">
                        <line x1="150" y1="220" x2="650" y2="220" stroke="#7a8a9a" stroke-width="4" stroke-linecap="round"/>
                        <!-- 喷头 -->
                        <rect x="195" y="220" width="4" height="10" fill="#8899aa"/>
                        <rect x="295" y="220" width="4" height="10" fill="#8899aa"/>
                        <rect x="395" y="220" width="4" height="10" fill="#8899aa"/>
                        <rect x="495" y="220" width="4" height="10" fill="#8899aa"/>
                        <rect x="595" y="220" width="4" height="10" fill="#8899aa"/>

                        <!-- 水滴（默认隐藏） -->
                        <g id="sprayDrops" opacity="0">
                            <circle cx="197" cy="245" r="3" fill="#4a90d9" opacity="0.7"/>
                            <circle cx="197" cy="265" r="2.5" fill="#4a90d9" opacity="0.5"/>
                            <circle cx="297" cy="248" r="3" fill="#4a90d9" opacity="0.7"/>
                            <circle cx="297" cy="268" r="2.5" fill="#4a90d9" opacity="0.5"/>
                            <circle cx="397" cy="245" r="3" fill="#4a90d9" opacity="0.7"/>
                            <circle cx="397" cy="265" r="2.5" fill="#4a90d9" opacity="0.5"/>
                            <circle cx="497" cy="248" r="3" fill="#4a90d9" opacity="0.7"/>
                            <circle cx="497" cy="268" r="2.5" fill="#4a90d9" opacity="0.5"/>
                            <circle cx="597" cy="245" r="3" fill="#4a90d9" opacity="0.7"/>
                            <circle cx="597" cy="265" r="2.5" fill="#4a90d9" opacity="0.5"/>
                        </g>
                    </g>

                    <!-- 报警提示框（默认隐藏） -->
                    <g id="alertPanel" opacity="0" transform="translate(400, 60)">
                        <rect x="-150" y="-25" width="300" height="50" fill="#fff3cd" stroke="#ffc107" stroke-width="2" rx="8" filter="url(#shadow)"/>
                        <text id="alertText" x="0" y="5" text-anchor="middle" font-size="14" fill="#856404" font-family="Arial" font-weight="bold">⚠️ 建议灌溉</text>
                    </g>

                    <!-- 自动模式指示（默认隐藏） -->
                    <g id="autoModeIndicator" opacity="0" transform="translate(680, 120)">
                        <rect x="0" y="0" width="80" height="28" fill="#17a2b8" rx="14" opacity="0.9"/>
                        <text x="40" y="19" text-anchor="middle" font-size="11" fill="#fff" font-family="Arial">自动模式</text>
                    </g>
                </svg>
            </section>

            <!-- 右侧：数据面板 -->
            <aside class="data-panel" id="dataPanel">
                <!-- 传感器数据卡片 -->
                <div class="panel-section">
                    <h3 class="section-title">环境监测</h3>
                    <div class="card-grid">
                        <div class="data-card" id="cardTemperature">
                            <div class="card-icon">🌡️</div>
                            <div class="card-value" id="valTemperature">--</div>
                            <div class="card-label">空气温度</div>
                            <div class="card-unit">°C</div>
                        </div>
                        <div class="data-card" id="cardAirHumidity">
                            <div class="card-icon">💧</div>
                            <div class="card-value" id="valAirHumidity">--</div>
                            <div class="card-label">空气湿度</div>
                            <div class="card-unit">%</div>
                        </div>
                        <div class="data-card" id="cardSoilHumidity">
                            <div class="card-icon">🌱</div>
                            <div class="card-value" id="valSoilHumidity">--</div>
                            <div class="card-label">土壤湿度</div>
                            <div class="card-unit">%</div>
                        </div>
                        <div class="data-card" id="cardLight">
                            <div class="card-icon">☀️</div>
                            <div class="card-value" id="valLight">--</div>
                            <div class="card-label">光照强度</div>
                            <div class="card-unit">lux</div>
                        </div>
                        <div class="data-card" id="cardCO2">
                            <div class="card-icon">🌫️</div>
                            <div class="card-value" id="valCO2">--</div>
                            <div class="card-label">CO₂ 浓度</div>
                            <div class="card-unit">ppm</div>
                        </div>
                        <div class="data-card" id="cardWater">
                            <div class="card-icon">🚰</div>
                            <div class="card-value" id="valWater">--</div>
                            <div class="card-label">水箱液位</div>
                            <div class="card-unit">%</div>
                        </div>
                    </div>
                </div>

                <!-- 设备状态 -->
                <div class="panel-section">
                    <h3 class="section-title">设备状态</h3>
                    <div class="status-list">
                        <div class="status-item" id="statusFan">
                            <span class="status-dot" id="dotFan"></span>
                            <span class="status-name">风扇</span>
                            <span class="status-text" id="textFan">关闭</span>
                        </div>
                        <div class="status-item" id="statusPump">
                            <span class="status-dot" id="dotPump"></span>
                            <span class="status-name">水泵</span>
                            <span class="status-text" id="textPump">关闭</span>
                        </div>
                        <div class="status-item" id="statusLamp">
                            <span class="status-dot" id="dotLamp"></span>
                            <span class="status-name">补光灯</span>
                            <span class="status-text" id="textLamp">关闭</span>
                        </div>
                        <div class="status-item" id="statusSpray">
                            <span class="status-dot" id="dotSpray"></span>
                            <span class="status-name">喷淋</span>
                            <span class="status-text" id="textSpray">关闭</span>
                        </div>
                        <div class="status-item" id="statusAuto">
                            <span class="status-dot" id="dotAuto"></span>
                            <span class="status-name">控制模式</span>
                            <span class="status-text" id="textAuto">手动</span>
                        </div>
                    </div>
                </div>

                <!-- 报警状态 -->
                <div class="panel-section">
                    <h3 class="section-title">报警状态</h3>
                    <div class="alarm-list">
                        <div class="alarm-item" id="alarmSoil">
                            <span class="alarm-icon" id="iconSoil">✓</span>
                            <span class="alarm-name">土壤湿度</span>
                            <span class="alarm-status" id="statusSoil">正常</span>
                        </div>
                        <div class="alarm-item" id="alarmTemp">
                            <span class="alarm-icon" id="iconTemp">✓</span>
                            <span class="alarm-name">温度</span>
                            <span class="alarm-status" id="statusTemp">正常</span>
                        </div>
                        <div class="alarm-item" id="alarmWater">
                            <span class="alarm-icon" id="iconWater">✓</span>
                            <span class="alarm-name">水位</span>
                            <span class="alarm-status" id="statusWater">正常</span>
                        </div>
                        <div class="alarm-item" id="alarmCO2">
                            <span class="alarm-icon" id="iconCO2">✓</span>
                            <span class="alarm-name">CO₂</span>
                            <span class="alarm-status" id="statusCO2">正常</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="greenhouse_widget.js"></script>
</body>
</html>
